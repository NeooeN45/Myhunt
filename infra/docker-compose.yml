services:
  postgis:
    image: postgis/postgis:17-3.5
    container_name: cynetrace-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: cynetrace
      POSTGRES_USER: cynetrace
      POSTGRES_PASSWORD: cynetrace
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:RELEASE.2026-02-27T01-17-25Z
    container_name: cynetrace-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cynetrace
      MINIO_ROOT_PASSWORD: cynetrace123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgis-data:
  minio-data:
